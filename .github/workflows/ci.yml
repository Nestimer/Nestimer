name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── API tests (Python) ───
  api-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          SECRET_KEY: "ci-test-secret-not-for-production"
        run: python -m pytest tests/ -v --tb=short

  # ─── Web dashboard (lint + build) ───
  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

  # ─── macOS Agent (Swift build) ───
  agent-build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Agent (Release)
        run: |
          xcodebuild -project macos-agent/UsageTimeAgent.xcodeproj \
            -scheme UsageTimeAgent \
            -configuration Release \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION=YES \
            build

  # ─── Parent App (Swift build) ───
  parent-app-build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Parent App (macOS)
        run: |
          xcodebuild -project ParentApp/UsageTimeControl.xcodeproj \
            -scheme UsageTimeControl \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION=YES \
            build

  # ─── Docker build (API + Web) ───
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t nestimer-api ./api

      - name: Build Web image
        run: docker build -t nestimer-web ./web-dashboard
