services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nestimer
      POSTGRES_USER: nestimer
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nestimer"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://nestimer:${DB_PASSWORD:?set DB_PASSWORD in .env}@db:5432/nestimer
      - SECRET_KEY=${SECRET_KEY:?set SECRET_KEY in .env}
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build: ./web-dashboard
    ports:
      - "127.0.0.1:3080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
