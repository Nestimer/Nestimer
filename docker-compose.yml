version: "3.8"

services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/usagetime.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  web:
    build: ./web-dashboard
    ports:
      - "3080:80"
    depends_on:
      - api
    restart: unless-stopped

